<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <!-- new triangle A-B-D (worst corner reflected above the kept edge) -->
  <polygon points="80,190 280,190 180,60" fill="#e3f1e8" stroke="#5fae87" stroke-width="1.5"/>
  <!-- original triangle A-B-C (worst corner C below the kept edge) -->
  <polygon points="80,190 280,190 180,310" fill="#f6e0db" stroke="#c96a5a" stroke-width="1.5"/>

  <!-- reflection of the worst corner C across edge A-B -> D -->
  <line x1="180" y1="298" x2="180" y2="74" stroke="#8a8a8a" stroke-width="1.5"
        stroke-dasharray="5,4" marker-end="url(#ar)"/>

  <circle cx="80"  cy="190" r="4.5" fill="#333"/>
  <circle cx="280" cy="190" r="4.5" fill="#333"/>
  <circle cx="180" cy="310" r="4.5" fill="#c0392b"/>
  <circle cx="180" cy="60"  r="4.5" fill="#1e8449"/>

  <text x="48"  y="208" font-size="13" fill="#333">A: 7</text>
  <text x="288" y="208" font-size="13" fill="#333">B: 5</text>
  <text x="150" y="332" font-size="13" fill="#c0392b">C: 2 (worst)</text>
  <text x="152" y="48"  font-size="13" fill="#1e8449">D: 9 (new)</text>
  <text x="190" y="150" font-size="11" fill="#777">reflect C across edge A-B</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8a8a8a"/>
    </marker>
  </defs>
</svg>
